version = "3.9.4"
runner.dialect = scala3
maxColumn = 120
preset = IntelliJ
align.preset = none
align.openParenCallSite = false
align.openParenDefnSite = false
danglingParentheses.preset = true
project.git = true
project.excludeFilters = ["target/"]

rewrite.rules = [
  AvoidInfix,
  RedundantBraces,
  RedundantParens,
  SortModifiers,
  PreferCurlyFors,
  Imports
]
